services:
  - type: worker
    name: anonymous-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_NAME
        value: anonymous_bot.db
      - key: REVEAL_COST
        value: "0"